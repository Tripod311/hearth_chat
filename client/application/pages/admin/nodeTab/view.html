<div class="w-full h-full flex flex-col gap-4 p-4">
	<div class="p-2 rounded-xl border border-default flex flex-col">
		<span class="text-lg">Node name</span>
		<input data-ref="name" type="text" class="w-full p-2 border border-default bg-white text-black rounded-xl" />
	</div>
	<div class="p-2 rounded-xl border border-default flex flex-col">
		<span class="text-lg">Node description</span>
		<textarea data-ref="description" class="w-full p-2 border border-default bg-white text-black rounded-xl min-h-[300px]"></textarea>
	</div>
	<div class="p-2 rounded-xl border border-default flex flex-col">
		<span class="text-lg">Title page content</span>
		<textarea data-ref="title_page" class="w-full p-2 border border-default bg-white text-black rounded-xl min-h-[300px]"></textarea>
	</div>
	<div class="p-2 rounded-xl border border-default flex flex-col">
		<span class="text-lg">HTTP port (manual restart required)</span>
		<input data-ref="http_port" type="number" class="w-full p-2 border border-default bg-white text-black rounded-xl" />
	</div>
	<div class="p-2 rounded-xl border border-default flex flex-col">
		<span class="text-lg">Gate port (manual restart required)</span>
		<input data-ref="gate_port" type="number" class="w-full p-2 border border-default bg-white text-black rounded-xl" />
	</div>
	<div class="w-full flex flex-row gap-2 justify-center">
		<div data-ref="submit" class="p-2 rounded bg-hover text-white border-default cursor-pointer border border-strong select-none">Submit</div>
	</div>
</div>
